name: Site quality

on:
  pull_request:
  push:
    branches: [main, "codex/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validated editorial dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r scripts/requirements.lock
      - name: Compile automation
        run: python -m py_compile scripts/content_governance.py scripts/content_maintenance.py scripts/ideas_daily_agent.py scripts/daily_news_agent.py
      - name: Test content and site contracts
        run: python -m unittest discover -s tests -v
      - name: Validate public indexes and deployment configuration
        run: |
          python -c "import xml.etree.ElementTree as ET, tomllib; ET.parse('sitemap.xml'); ET.parse('feed.xml'); tomllib.load(open('netlify.toml','rb')); print('public_artifacts_ok')"
