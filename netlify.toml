[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/linkedin_essay_queue.json"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/ideas/"
  to     = "/ideas.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/ideas/_drafts/*"
  to     = "/"
  status = 404
  force  = true

# Canonicalize a duplicate article without breaking existing inbound links.
[[redirects]]
  from   = "/insights/construction-loan-fiDi-rental-tower.html"
  to     = "/insights/grubb-fidi-construction-loan.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/insights/construction-loan-fidi-rental-tower.html"
  to     = "/insights/grubb-fidi-construction-loan.html"
  status = 301
  force  = true

# Block public access to internal tools
[[redirects]]
  from   = "/origination.html"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/insights-admin.html"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/data/*"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/agent/*"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/memory/*"
  to     = "/"
  status = 404
  force  = true

[[redirects]]
  from   = "/scripts/*"
  to     = "/"
  status = 404
  force  = true

# Force HTTPS
[[redirects]]
  from   = "http://lighttowergroup.co/*"
  to     = "https://lighttowergroup.co/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.lighttowergroup.co/*"
  to     = "https://lighttowergroup.co/:splat"
  status = 301
  force  = true

# Security headers (all pages)
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Clickjacking, also reinforced by CSP frame-ancestors below
    X-Frame-Options = "DENY"

    # Don't leak full referring URL to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features not used by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Force HTTPS for 2 years; include subdomains; eligible for browser preload list
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Content Security Policy
    # - script-src unsafe-inline: required because pages use inline <script> blocks and onclick handlers
    # - style-src unsafe-inline: required for inline <style> blocks
    # - fonts.googleapis.com / fonts.gstatic.com: Google Fonts
    # - connect-src 'self': chat widget calls /.netlify/functions/chat (same origin)
    # - img-src 'self' https: data: profile photo + any HTTPS images + data URIs
    # - frame-ancestors 'none': no framing allowed (clickjacking protection)
    # - base-uri 'self': prevent base tag hijacking
    # - form-action 'self': the public mandate form posts to a first-party Netlify function
    # - object-src 'none': block Flash/plugin execution
    # - upgrade-insecure-requests: auto-upgrade any stray HTTP sub-resource calls
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;"

# Cache static assets aggressively
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/chat-widget.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/insights.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Netlify functions: no caching
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
